<script>
// ===== КОНФИГУРАЦИЯ JSONBIN =====
const JSONBIN_KEY = '$2a$10$AxIfA8p7dq6td0BYtWWuhecnyqCJbsTGoo.oWIds3H01C43GvLGuu';
const JSONBIN_BIN_ID = '6a411873f5f4af5e293d0edd';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

// ===== ОБЛАЧНЫЕ ФУНКЦИИ =====
async function loadOrdersFromCloud() {
  try {
    const res = await fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    const data = await res.json();
    return data.record.orders || [];
  } catch(e) {
    console.log('Ошибка загрузки:', e);
    return [];
  }
}

async function saveOrderToCloud(order) {
  const orders = await loadOrdersFromCloud();
  orders.push(order);
  try {
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'X-Master-Key': JSONBIN_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ orders })
    });
    return true;
  } catch(e) {
    console.log('Ошибка сохранения:', e);
    return false;
  }
}

// ===== МЕНЮ (61 ПОЗИЦИЯ) =====
const menuData = {

  ru:{salads:'Салаты',deli:'Деликатесы',soups:'Супы',main:'Основные',bakery:'Выпечка',desserts:'Десерты',party:'Компания',drinks:'Напитки',garnish:'Гарниры',tea:'Чаи',sauces:'Соусы',cart_title:'Заказ',add:'Добавить',total:'Итого'},
  kk:{salads:'Салаттар',deli:'Тіскебасарлар',soups:'Сорпалар',main:'Негізгі',bakery:'Нан-тоқаш',desserts:'Тәттілер',party:'Ұжымдық',drinks:'Сусындар',garnish:'Гарнирлер',tea:'Шайлар',sauces:'Тұздықтар',cart_title:'Тапсырыс',add:'Қосу',total:'Барлығы'},
  en:{salads:'Salads',deli:'Delicacies',soups:'Soups',main:'Main',bakery:'Bakery',desserts:'Desserts',party:'Group',drinks:'Drinks',garnish:'Sides',tea:'Tea',sauces:'Sauces',cart_title:'Order',add:'Add',total:'Total'}

let currentLang='ru',cart=[],currentCategory='salads';
const GIF_URL='sprites/horse.gif';

function switchCategory(k){currentCategory=k;document.querySelectorAll('.category-tab').forEach(t=>t.classList.remove('active'));const tab=document.querySelector(`.category-tab[data-cat="${k}"]`);if(tab)tab.classList.add('active');moveDrop(k);renderCategoryPage(k);}
function moveDrop(k){const tab=document.querySelector(`.category-tab[data-cat="${k}"]`),drop=document.getElementById('categories-drop'),nav=document.getElementById('categories-nav');if(tab&&drop&&nav){const nr=nav.getBoundingClientRect(),tr=tab.getBoundingClientRect();drop.style.left=(tr.left-nr.left)+'px';drop.style.width=tr.width+'px';}}
function searchMenu(){const q=document.getElementById('search-input').value.trim().toLowerCase();document.getElementById('search-clear').style.display=q.length>0?'block':'none';if(q.length>0){let f=[];for(const k in menuData){f.push(...menuData[k].items.filter(i=>(i.name.ru||'').toLowerCase().includes(q)));}document.getElementById('category-page').innerHTML=f.length?`<div class="menu-grid">${f.map(renderItem).join('')}</div>`:'<p style="text-align:center;opacity:0.5;padding:40px;">Ничего не найдено</p>';}else{renderCategoryPage(currentCategory);}}
function clearSearch(){document.getElementById('search-input').value='';document.getElementById('search-clear').style.display='none';renderCategoryPage(currentCategory);}
function renderCategoryPage(k){const pg=document.getElementById('category-page'),c=menuData[k];if(c)pg.innerHTML=`<div class="category-page-header"><i class="fas ${c.icon}"></i> ${c.name[currentLang]}</div><div class="menu-grid">${c.items.map(renderItem).join('')}</div>`;}
function renderItem(item){const ci=cart.find(c=>c.id===item.id),qty=ci?ci.quantity:0;return `<div class="menu-item" id="item-${item.id}"><img src="${item.image||'https://via.placeholder.com/300x200'}" class="menu-item-image" onerror="this.src='https://via.placeholder.com/300x200'"><div class="menu-item-content"><div class="menu-item-title">${item.name[currentLang]||item.name.ru}</div><div class="menu-item-footer"><span class="menu-item-price">${item.price.toLocaleString()} ₸</span>${qty>0?`<div class="quantity-control"><button class="quantity-btn" onclick="changeQuantity(${item.id},-1)">−</button><span class="quantity-num">${qty}</span><button class="quantity-btn" onclick="changeQuantity(${item.id},1)">+</button></div>`:`<button class="add-btn" onclick="addToCart(${item.id})">${langDict[currentLang]?.add||'Добавить'}</button>`}</div><div class="rider-trail" id="trail-${item.id}"></div></div></div>`;}
function setLanguage(l){currentLang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));document.querySelectorAll('[data-lang-key]').forEach(el=>{const k=el.getAttribute('data-lang-key');if(langDict[l]?.[k])el.textContent=langDict[l][k];});renderCategoryPage(currentCategory);updateCart();}
function findItemById(id){for(const k in menuData){const f=menuData[k].items.find(i=>i.id===id);if(f)return f;}return null;}
function addToCart(id){const item=findItemById(id);if(!item)return;const ex=cart.find(c=>c.id===id);if(!ex)cart.push({...item,quantity:1});else ex.quantity+=1;updateCart();refreshView();runHorse(id);}
function changeQuantity(id,d){const ci=cart.find(c=>c.id===id);if(!ci)return;ci.quantity+=d;if(ci.quantity<=0)cart=cart.filter(c=>c.id!==id);else if(d>0)runHorse(id);updateCart();refreshView();}
function runHorse(id){const card=document.getElementById('item-'+id);if(!card)return;const trail=document.getElementById('trail-'+id);if(trail){trail.style.width='100%';trail.style.opacity='1';trail.style.background='linear-gradient(90deg,transparent,#f7971e,#ff6b35,#f7971e,transparent)';trail.style.boxShadow='0 0 20px #f7971e,0 0 40px #ff4444';setTimeout(()=>{trail.style.opacity='0';trail.style.boxShadow='none';},5000);}const horse=document.createElement('img');horse.src=GIF_URL;horse.style.cssText='position:absolute;bottom:6px;left:5%;width:80px;z-index:30;transition:left 3s ease-out;filter:drop-shadow(0 0 10px rgba(247,151,30,0.6));';card.appendChild(horse);requestAnimationFrame(()=>{horse.style.left='55%';});for(let d=0;d<8;d++){setTimeout(()=>{const dust=document.createElement('div');dust.style.cssText='position:absolute;bottom:3px;left:'+(8+d*8)+'%;width:4px;height:4px;background:rgba(210,180,140,0.6);border-radius:50%;z-index:25;animation:dustParticle 0.7s ease-out forwards;';card.appendChild(dust);setTimeout(()=>dust.remove(),700);},d*120);}setTimeout(()=>{horse.style.opacity='0';setTimeout(()=>horse.remove(),500);},2800);}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);updateCart();refreshView();}
function refreshView(){document.getElementById('search-input').value?searchMenu():renderCategoryPage(currentCategory);}
function updateCart(){document.getElementById('cart-count').textContent=cart.reduce((s,i)=>s+i.quantity,0);const tot=cart.reduce((s,i)=>s+i.price*i.quantity,0);document.getElementById('total-sum').textContent=`${langDict[currentLang]?.total||'Итого'}: ${tot.toLocaleString()} ₸`;document.getElementById('cart-content').innerHTML=cart.length?cart.map(i=>`<div class="cart-item"><div><b>${i.name.ru||''}</b> ×${i.quantity}</div><div>${(i.price*i.quantity).toLocaleString()} ₸</div><div><button onclick="changeQuantity(${i.id},-1)" style="background:#e74c3c;color:white;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;">−</button> <button onclick="changeQuantity(${i.id},1)" style="background:#2ecc71;color:white;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;">+</button></div></div>`).join(''):'<p style="text-align:center;opacity:0.5">Корзина пуста</p>';}
function toggleCart(){document.getElementById('cart-sidebar').classList.toggle('open');}

function openCheckout(){
  if(!cart.length)return;
  const cats=[...new Set(cart.map(i=>i.category))];
  const sched=document.getElementById('time-schedule');
  if(sched)sched.innerHTML=cats.map(cat=>`<div class="time-category-group"><label>${(categoryTimeMap[cat]||{icon:'📦'}).icon} ${langDict[currentLang]?.[cat]||cat}</label><input type="time" id="time-${(categoryTimeMap[cat]||{timeKey:cat}).timeKey}"></div>`).join('');
  document.getElementById('order-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('checkout-modal').classList.add('open');
}
function closeCheckout(){document.getElementById('checkout-modal').classList.remove('open');}
async function submitOrder(){
  const name=document.getElementById('guest-name').value.trim(),phone=document.getElementById('guest-phone').value.trim(),date=document.getElementById('order-date').value;
  if(!name||!phone||!date){const t=document.getElementById('toast');t.textContent='❌ Заполните все поля!';t.className='toast error show';setTimeout(()=>t.classList.remove('show'),2000);return;}
  const times={};[...new Set(cart.map(i=>i.category))].forEach(c=>{const tk=(categoryTimeMap[c]||{timeKey:c}).timeKey;const inp=document.getElementById('time-'+tk);if(inp)times[tk]=inp.value;});
  const tot=cart.reduce((s,i)=>s+i.price*i.quantity,0);
  const order={id:Date.now(),restaurant:'Sandyq Алматы, Абылайхана 55',guest:{name,phone},date,items:cart.map(i=>({id:i.id,name:i.name,price:i.price,quantity:i.quantity,category:i.category})),times,special:document.getElementById('special-requests')?.value||'',total:tot,timestamp:new Date().toISOString()};
  
  // СОХРАНЯЕМ В ОБЛАКО
  const saved = await saveOrderToCloud(order);
  
  cart=[];updateCart();refreshView();closeCheckout();
  document.getElementById('guest-name').value='';document.getElementById('guest-phone').value='';document.getElementById('special-requests').value='';
  document.querySelectorAll('#time-schedule input').forEach(el=>el.value='');
  const t=document.getElementById('toast');
  t.textContent=saved?'✅ Заказ отправлен!':'⚠️ Ошибка, попробуйте позже';
  t.className='toast success show';setTimeout(()=>t.classList.remove('show'),2000);
}

document.addEventListener('DOMContentLoaded',()=>{renderCategoryPage('salads');updateCart();moveDrop('salads');window.addEventListener('resize',()=>moveDrop(currentCategory));});
