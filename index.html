<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sandyq Алматы — Элитный этно-ресторан</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 30%, #16213e 60%, #0f0f1a 100%);
      background-attachment: fixed;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(247, 151, 30, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(46, 204, 113, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(155, 89, 182, 0.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
      animation: bgShift 20s ease-in-out infinite;
    }
    @keyframes bgShift { 0%,100%{opacity:0.8} 25%{opacity:1} 50%{opacity:0.6} 75%{opacity:0.9} }

    /* ===== HEADER ===== */
    header {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 1rem 0; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .header-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .logo h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #f7971e, #ffd200); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
    @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }
    .subtitle { font-size:0.9rem; opacity:0.7; display:block; }
    .address { font-size:0.8rem; opacity:0.5; display:block; }
    .header-controls { display:flex; align-items:center; gap:15px; flex-wrap:wrap; }
    .header-center { flex:1; max-width:380px; margin:0 20px; }

    .search-box { display:flex; align-items:center; background:rgba(255,255,255,0.06); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12); border-radius:25px; padding:10px 16px; gap:10px; transition:all 0.3s; }
    .search-box:focus-within { border-color:#f7971e; box-shadow:0 0 25px rgba(247,151,30,0.2); }
    .search-box i { color:rgba(255,255,255,0.4); }
    .search-box input { flex:1; background:none; border:none; color:white; font-size:0.95rem; outline:none; }
    .search-box input::placeholder { color:rgba(255,255,255,0.3); }
    .search-clear { background:none; border:none; color:rgba(255,255,255,0.5); cursor:pointer; font-size:1.3rem; }
    .search-clear:hover { color:#e74c3c; }

    .theme-btn { width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);color:#f7971e;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s; }
    .theme-btn:hover { background:rgba(255,255,255,0.15);box-shadow:0 0 20px rgba(247,151,30,0.3); }

    .language-selector { display:flex; gap:6px; background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); padding:5px; border-radius:25px; border:1px solid rgba(255,255,255,0.1); }
    .lang-btn { padding:7px 15px; border:none; border-radius:20px; cursor:pointer; background:transparent; color:rgba(255,255,255,0.6); font-size:0.85rem; font-weight:600; transition:all 0.3s; }
    .lang-btn:hover { color:#fff; }
    .lang-btn.active { background:linear-gradient(135deg,#f7971e,#e67e22); color:white; box-shadow:0 4px 15px rgba(247,151,30,0.4); }

    .cart-btn { background:linear-gradient(135deg,rgba(247,151,30,0.9),rgba(230,126,34,0.9)); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.2); color:white; padding:12px 22px; border-radius:25px; cursor:pointer; position:relative; font-size:1.1rem; transition:all 0.3s; box-shadow:0 4px 20px rgba(247,151,30,0.3); overflow:hidden; }
    .cart-btn::after { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle,rgba(255,255,255,0.2) 0%,transparent 60%); animation:rotateGlow 4s linear infinite; }
    @keyframes rotateGlow { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
    .cart-btn:hover { transform:scale(1.05); box-shadow:0 8px 30px rgba(247,151,30,0.5); }
    .cart-count { background:#e74c3c; border-radius:50%; padding:3px 10px; font-size:0.8rem; position:absolute; top:-10px; right:-10px; box-shadow:0 4px 15px rgba(231,76,60,0.5); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    .icon-btn { color:white; font-size:1.3rem; padding:10px 14px; border-radius:50%; background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); transition:all 0.3s; text-decoration:none; }
    .icon-btn:hover { background:rgba(255,255,255,0.15); }

    /* ===== НАВИГАЦИЯ ===== */
    .main-nav { position:sticky; top:78px; z-index:90; background:rgba(10,10,20,0.8); backdrop-filter:blur(25px) saturate(180%); -webkit-backdrop-filter:blur(25px) saturate(180%); border-bottom:1px solid rgba(255,255,255,0.06); padding:8px 20px; }
    .categories-nav { display:flex; flex-wrap:wrap; gap:8px; padding:6px; background:rgba(255,255,255,0.03); backdrop-filter:blur(15px) saturate(180%); -webkit-backdrop-filter:blur(15px) saturate(180%); border:1px solid rgba(255,255,255,0.08); border-radius:25px; position:relative; overflow:visible!important; }
    .categories-drop { position:absolute; top:6px; left:6px; height:30px; background:linear-gradient(135deg,rgba(247,151,30,0.9),rgba(230,126,34,0.85)); backdrop-filter:blur(10px); border-radius:22px; transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1); z-index:0; box-shadow:0 4px 20px rgba(247,151,30,0.4),inset 0 1px 0 rgba(255,255,255,0.2); }
    .categories-drop::after { content:''; position:absolute; top:3px; left:15%; width:40%; height:25%; background:rgba(255,255,255,0.3); border-radius:50%; filter:blur(2px); }
    .category-tab { padding:10px 16px; border:none; border-radius:20px; cursor:pointer; background:transparent; color:rgba(255,255,255,0.65); font-size:0.9rem; transition:all 0.3s; white-space:nowrap; position:relative; z-index:1; font-weight:500; }
    .category-tab:hover { color:#fff; }
    .category-tab.active { color:#fff; font-weight:700; }
    .category-tab i { margin-right:5px; }

    .mobile-cat-cards { display:none; gap:8px; padding:5px 0; }
    .mobile-cat-card { background:rgba(255,255,255,0.04); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:12px 10px; text-align:center; cursor:pointer; font-size:0.75rem; color:rgba(255,255,255,0.7); transition:all 0.3s; min-width:70px; }
    .mobile-cat-card i { display:block; font-size:1.2rem; margin-bottom:4px; color:#f7971e; }
    .mobile-cat-card:active { background:rgba(247,151,30,0.3); }
    .mobile-back-btn { display:none; background:none; border:none; color:#f7971e; font-size:1rem; cursor:pointer; padding:8px 0; }
    .mobile-back-btn i { margin-right:5px; }

    /* ===== КОНТЕНТ ===== */
    .menu-container { max-width:1400px; margin:0 auto; padding:30px 20px; position:relative; z-index:1; }
    .category-page-header { font-size:2.2rem; font-weight:800; margin-bottom:30px; color:#fff; display:flex; align-items:center; gap:12px; }
    .category-page-header i { color:#f7971e; }
    .subcategory-title { font-size:1.2rem; font-weight:600; color:rgba(255,255,255,0.6); margin:25px 0 15px; padding-left:12px; border-left:3px solid rgba(247,151,30,0.5); }
    .menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }

    .menu-item { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); border:1px solid rgba(255,255,255,0.08); border-radius:20px; overflow:visible; box-shadow:0 8px 32px rgba(0,0,0,0.3); transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); position:relative; }
    .menu-item::after { content:''; position:absolute; top:0;left:0;right:0;bottom:0; background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%); pointer-events:none; border-radius:20px; }
    .menu-item:hover { transform:translateY(-8px); box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 30px rgba(247,151,30,0.1); border-color:rgba(247,151,30,0.3); }
    .menu-item-image { width:100%; height:200px; object-fit:cover; border-radius:20px 20px 0 0; background:rgba(255,255,255,0.02); }
    .menu-item-content { padding:18px; position:relative; z-index:1; }
    .menu-item-title { font-size:1.05rem; font-weight:600; margin-bottom:10px; color:#fff; }
    .menu-item-desc { font-size:0.75rem; color:rgba(255,255,255,0.5); margin-bottom:8px; }
    .menu-item-footer { display:flex; justify-content:space-between; align-items:center; margin-top:12px; position:relative; }
    .menu-item-price { font-size:1.3rem; font-weight:800; background:linear-gradient(135deg,#f7971e,#ffd200); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; z-index:2; }
    .add-btn { background:linear-gradient(135deg,#2ecc71,#27ae60); border:none; color:white; padding:9px 18px; border-radius:20px; cursor:pointer; font-weight:600; box-shadow:0 4px 15px rgba(46,204,113,0.3); position:relative; z-index:2; transition:all 0.3s; }
    .add-btn:hover { transform:scale(1.06); box-shadow:0 8px 25px rgba(46,204,113,0.5); }
    .quantity-control { display:flex; align-items:center; gap:6px; z-index:2; }
    .quantity-btn { width:30px; height:30px; border:1px solid rgba(255,255,255,0.2); border-radius:50%; background:rgba(255,255,255,0.06); backdrop-filter:blur(5px); color:white; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:all 0.3s; }
    .quantity-btn:hover { background:rgba(247,151,30,0.5); border-color:#f7971e; box-shadow:0 4px 15px rgba(247,151,30,0.3); }
    .quantity-num { width:24px; text-align:center; font-weight:700; font-size:1rem; color:#fff; }
    .rider-trail { position:absolute; bottom:8px; left:0; height:3px; background:linear-gradient(90deg,transparent,rgba(247,151,30,0.6),#f7971e,rgba(247,151,30,0.6),transparent); border-radius:2px; z-index:1; opacity:0; transition:all 0.5s ease; width:0; }

    /* ===== КОРЗИНА ===== */
    .cart-sidebar { position:fixed; top:0; right:-480px; width:460px; height:100vh; background:rgba(10,10,20,0.9); backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%); border-left:1px solid rgba(255,255,255,0.1); box-shadow:-10px 0 50px rgba(0,0,0,0.5); transition:right 0.5s cubic-bezier(0.22,1,0.36,1); z-index:200; display:flex; flex-direction:column; }
    .cart-sidebar.open { right:0; }
    .cart-header { padding:25px; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between; align-items:center; }
    .close-cart { background:none; border:none; color:rgba(255,255,255,0.5); font-size:2rem; cursor:pointer; transition:all 0.3s; }
    .close-cart:hover { color:#e74c3c; transform:rotate(90deg); }
    .back-btn { background:none; border:none; color:#f7971e; font-size:1rem; cursor:pointer; display:flex; align-items:center; gap:5px; padding:8px 0; }
    .cart-content { flex:1; padding:20px; overflow-y:auto; }
    .empty-cart { text-align:center; color:rgba(255,255,255,0.3); margin-top:60px; }
    .empty-cart i { font-size:4rem; margin-bottom:15px; opacity:0.2; }
    .cart-item { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .cart-item-info { flex:1; }
    .cart-item-name { font-weight:600; color:#fff; }
    .cart-item-actions { display:flex; align-items:center; gap:5px; }
    .cart-item-actions button { border:1px solid rgba(255,255,255,0.15); color:white; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:0.9rem; transition:all 0.3s; background:rgba(255,255,255,0.05); }
    .cart-footer { padding:25px; border-top:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.3); }
    .cart-summary { font-size:0.9rem; color:rgba(255,255,255,0.5); margin-bottom:10px; padding:10px 0; border-top:1px dashed rgba(255,255,255,0.08); }
    .cart-summary-row { display:flex; justify-content:space-between; padding:4px 0; }
    .cart-summary-row.total { font-weight:700; color:#f7971e; font-size:1.15rem; border-top:1px solid rgba(255,255,255,0.08); margin-top:6px; padding-top:10px; }
    .total-sum { font-size:1.3rem; font-weight:800; text-align:right; margin-bottom:12px; color:#f7971e; }

    .checkout-btn {
      width:100%; padding:16px;
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 25%, #f7971e 50%, #e67e22 75%, #f7971e 100%);
      background-size: 300% 300%;
      color:white; border:none; border-radius:25px;
      font-size:1.1rem; font-weight:700; cursor:pointer;
      animation: waveShimmer 3s ease-in-out infinite;
      box-shadow:0 8px 30px rgba(247,151,30,0.4);
      position:relative; overflow:hidden; z-index:10;
      display:block !important;
    }
    .checkout-btn::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle,rgba(255,255,255,0.3) 0%,transparent 60%); animation: rotateGlow 4s linear infinite; }
    @keyframes waveShimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes rotateGlow { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    /* ===== МОДАЛКА ===== */
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(5px); z-index:300; justify-content:center; align-items:center; padding:20px; }
    .modal.open { display:flex; }
    .modal-content { background:rgba(20,20,40,0.95); backdrop-filter:blur(25px) saturate(180%); -webkit-backdrop-filter:blur(25px) saturate(180%); border:1px solid rgba(255,255,255,0.1); max-width:650px; width:100%; border-radius:25px; max-height:90vh; overflow-y:auto; animation:modalIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); box-shadow:0 20px 60px rgba(0,0,0,0.5); }
    @keyframes modalIn { from{transform:translateY(40px) scale(0.95);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
    .modal-header { padding:22px 28px; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between; align-items:center; border-radius:25px 25px 0 0; }
    .close-modal { background:none; border:none; color:rgba(255,255,255,0.5); font-size:2rem; cursor:pointer; }
    .modal-body { padding:28px; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; margin-bottom:6px; font-weight:600; color:rgba(255,255,255,0.7); }
    .form-group input, .form-group textarea, .form-group select { width:100%; padding:12px 16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; font-size:1rem; transition:all 0.3s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline:none; border-color:#f7971e; box-shadow:0 0 15px rgba(247,151,30,0.15); }
    .time-schedule { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
    .time-category-group { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); padding:12px; border-radius:12px; }
    .time-category-group label { font-size:0.85rem; font-weight:600; color:rgba(255,255,255,0.5); display:block; margin-bottom:6px; }
    .time-category-group select { width:100%; padding:10px; background:rgba(26,29,46,0.9); border:1px solid rgba(255,255,255,0.15); border-radius:8px; color:white; }
    .time-category-group select option { background:#1a1d2e; color:white; }
    .modal-footer { padding:18px 28px; border-top:1px solid rgba(255,255,255,0.06); display:flex; justify-content:flex-end; gap:10px; }
    .btn-secondary { padding:10px 24px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:20px; color:white; cursor:pointer; font-weight:600; }
    .btn-primary { padding:10px 24px; background:linear-gradient(135deg,#f7971e,#e67e22); color:white; border:none; border-radius:20px; cursor:pointer; font-weight:700; box-shadow:0 4px 15px rgba(247,151,30,0.3); }
    .btn-primary:hover { box-shadow:0 8px 25px rgba(247,151,30,0.5); }

    /* ===== TOAST ===== */
    .toast { position:fixed; bottom:30px; right:30px; background:rgba(20,20,40,0.95); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); color:white; padding:16px 24px; border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,0.5); transform:translateY(120px); opacity:0; transition:all 0.4s; z-index:400; }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { border-left:4px solid #2ecc71; }

    @keyframes dustParticle { 0%{transform:translateY(0) scale(0.3);opacity:0.9} 100%{transform:translateY(-25px) scale(3);opacity:0} }

    /* ===== СВЕТЛАЯ ТЕМА ===== */
    body.light-theme { background:linear-gradient(135deg,#fdf6ee,#fff8f0,#fef5e7,#fdf2e0);color:#2a1508; }
    body.light-theme::before { background:radial-gradient(ellipse at 20% 50%,rgba(247,151,30,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(200,150,100,0.1) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(180,130,80,0.1) 0%,transparent 50%); }
    body.light-theme header { background:rgba(255,248,240,0.8);border-bottom:1px solid rgba(0,0,0,0.08); }
    body.light-theme .main-nav { background:rgba(255,248,240,0.9);border-bottom:1px solid rgba(0,0,0,0.06); }
    body.light-theme .categories-nav { background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.08); }
    body.light-theme .category-tab { color:rgba(0,0,0,0.6); }
    body.light-theme .category-tab.active { color:#fff; }
    body.light-theme .menu-item { background:rgba(255,255,255,0.8);border-color:rgba(0,0,0,0.08);box-shadow:0 8px 32px rgba(0,0,0,0.1); }
    body.light-theme .menu-item-title { color:#2a1508; }
    body.light-theme .category-page-header { color:#2a1508; }
    body.light-theme .search-box { background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.1); }
    body.light-theme .search-box input { color:#2a1508; }
    body.light-theme .cart-sidebar { background:rgba(255,248,240,0.95);border-left-color:rgba(0,0,0,0.1); }
    body.light-theme .modal-content { background:rgba(255,248,240,0.98);border-color:rgba(0,0,0,0.1); }
    body.light-theme .form-group input,body.light-theme .form-group textarea,body.light-theme .form-group select { background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.1);color:#2a1508; }
    body.light-theme .time-category-group select { background:rgba(255,248,240,0.9);border-color:rgba(0,0,0,0.15);color:#2a1508; }
    body.light-theme .time-category-group select option { background:#fff8f0;color:#2a1508; }
    body.light-theme .quantity-btn { border-color:rgba(0,0,0,0.2);color:#2a1508; }
    body.light-theme .quantity-num { color:#2a1508; }
    body.light-theme .mobile-cat-card { background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.08);color:rgba(0,0,0,0.6); }
    body.light-theme .mobile-cat-card i { color:#c49a2a; }

    /* ===== СКРОЛЛБАР ===== */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:rgba(255,255,255,0.02); }
    ::-webkit-scrollbar-thumb { background:rgba(247,151,30,0.3); border-radius:3px; }

    /* ===== АДАПТИВ ===== */
    @media (max-width:768px) {
      .header-container { flex-direction:column; gap:8px; }
      .header-center { max-width:100%; margin:0; order:3; }
      .main-nav { top:auto; position:relative; }
      .categories-nav { display:none; }
      .categories-drop { display:none; }
      .mobile-cat-cards { display:flex; flex-wrap:wrap; }
      .mobile-back-btn { display:block; }
      .menu-grid { grid-template-columns:1fr 1fr; gap:15px; }
      .time-schedule { grid-template-columns:1fr; }
      .cart-sidebar { width:100%; right:-100%; }
      .logo h1 { font-size:1.5rem; }
      .subtitle { font-size:0.7rem; }
      .address { font-size:0.65rem; }
      .category-page-header { font-size:1.4rem; }

function showCategoryCards(){document.getElementById('mobile-cat-cards').style.display='flex';document.getElementById('mobile-back-btn').style.display='none';document.getElementById('category-page').innerHTML='';}
function switchCategory(k){currentCategory=k;document.querySelectorAll('.category-tab').forEach(t=>t.classList.remove('active'));const tab=document.querySelector(`.category-tab[data-cat="${k}"]`);if(tab)tab.classList.add('active');moveDrop(k);renderCategoryPage(k);if(window.innerWidth<=768){document.getElementById('mobile-cat-cards').style.display='none';document.getElementById('mobile-back-btn').style.display='block';}}
function moveDrop(k){const tab=document.querySelector(`.category-tab[data-cat="${k}"]`),drop=document.getElementById('categories-drop'),nav=document.getElementById('categories-nav');if(tab&&drop&&nav){const nr=nav.getBoundingClientRect(),tr=tab.getBoundingClientRect();drop.style.left=(tr.left-nr.left)+'px';drop.style.width=tr.width+'px';drop.style.top=(tr.top-nr.top)+'px';drop.style.height=tr.height+'px';}}
function searchMenu(){const q=document.getElementById('search-input').value.trim().toLowerCase();document.getElementById('search-clear').style.display=q.length>0?'block':'none';if(q.length>0){let f=[];for(const k in menuData){f.push(...menuData[k].items.filter(i=>(i.name.ru||'').toLowerCase().includes(q)));}document.getElementById('category-page').innerHTML=f.length?`<div class="menu-grid">${f.map(renderItem).join('')}</div>`:'<p style="text-align:center;opacity:0.5;padding:40px;">Ничего не найдено</p>';}else{renderCategoryPage(currentCategory);}}
function clearSearch(){document.getElementById('search-input').value='';document.getElementById('search-clear').style.display='none';renderCategoryPage(currentCategory);}
function renderCategoryPage(k){const pg=document.getElementById('category-page'),c=menuData[k];if(!c)return;pg.innerHTML=`<div class="category-page-header"><i class="fas ${c.icon}"></i> ${c.name[currentLang]}</div><div class="menu-grid">${c.items.map(renderItem).join('')}</div>`;}
function renderItem(item){const ci=cart.find(c=>c.id===item.id),qty=ci?ci.quantity:0,desc=item.desc?item.desc[currentLang]:'';return `<div class="menu-item" id="item-${item.id}"><img src="${item.image||'https://via.placeholder.com/300x200'}" class="menu-item-image" onerror="this.src='https://via.placeholder.com/300x200'"><div class="menu-item-content"><div class="menu-item-title">${item.name[currentLang]||item.name.ru}</div>${desc?`<div class="menu-item-desc">${desc}</div>`:''}<div class="menu-item-footer"><span class="menu-item-price">${item.price.toLocaleString()} ₸</span>${qty>0?`<div class="quantity-control"><button class="quantity-btn" onclick="changeQuantity(${item.id},-1)">−</button><span class="quantity-num">${qty}</span><button class="quantity-btn" onclick="changeQuantity(${item.id},1)">+</button></div>`:`<button class="add-btn" onclick="addToCart(${item.id})">${langDict[currentLang]?.add||'Добавить'}</button>`}</div><div class="rider-trail" id="trail-${item.id}"></div></div></div>`;}
function setLanguage(l){currentLang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));document.querySelectorAll('[data-lang-key]').forEach(el=>{const k=el.getAttribute('data-lang-key');if(langDict[l]?.[k])el.textContent=langDict[l][k];});buildNav();renderCategoryPage(currentCategory);updateCart();}
function findItemById(id){for(const k in menuData){const f=menuData[k].items.find(i=>i.id===id);if(f)return f;}return null;}
function addToCart(id){const item=findItemById(id);if(!item)return;const ex=cart.find(c=>c.id===id);if(!ex)cart.push({...item,quantity:1});else ex.quantity+=1;updateCart();refreshView();runHorse(id);}
function changeQuantity(id,d){const ci=cart.find(c=>c.id===id);if(!ci)return;ci.quantity+=d;if(ci.quantity<=0)cart=cart.filter(c=>c.id!==id);else if(d>0)runHorse(id);updateCart();refreshView();}
function runHorse(id){const card=document.getElementById('item-'+id);if(!card)return;const trail=document.getElementById('trail-'+id);if(trail){trail.style.width='100%';trail.style.opacity='1';trail.style.background='linear-gradient(90deg,transparent,#f7971e,#ff6b35,#f7971e,transparent)';trail.style.boxShadow='0 0 20px #f7971e,0 0 40px #ff4444';setTimeout(()=>{trail.style.opacity='0';trail.style.boxShadow='none';},5000);}const horse=document.createElement('img');horse.src=GIF_URL;horse.style.cssText='position:absolute;bottom:6px;left:5%;width:80px;z-index:30;transition:left 3s ease-out;filter:drop-shadow(0 0 10px rgba(247,151,30,0.6));';card.appendChild(horse);requestAnimationFrame(()=>{horse.style.left='55%';});for(let d=0;d<8;d++){setTimeout(()=>{const dust=document.createElement('div');dust.style.cssText='position:absolute;bottom:3px;left:'+(8+d*8)+'%;width:4px;height:4px;background:rgba(210,180,140,0.6);border-radius:50%;z-index:25;animation:dustParticle 0.7s ease-out forwards;';card.appendChild(dust);setTimeout(()=>dust.remove(),700);},d*120);}setTimeout(()=>{horse.style.opacity='0';setTimeout(()=>horse.remove(),500);},2800);}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);updateCart();refreshView();}
function refreshView(){document.getElementById('search-input').value?searchMenu():renderCategoryPage(currentCategory);}

function updateCart(){
  document.getElementById('cart-count').textContent=cart.reduce((s,i)=>s+i.quantity,0);
  const sub=cart.reduce((s,i)=>s+i.price*i.quantity,0),serv=Math.round(sub*0.15),tot=sub+serv;
  document.getElementById('total-sum').textContent=`${langDict[currentLang]?.total||'Итого'}: ${tot.toLocaleString()} ₸`;
  const summary=document.getElementById('cart-summary');
  if(summary&&cart.length)summary.innerHTML=`<div class="cart-summary-row"><span>${langDict[currentLang]?.subtotal}:</span><span>${sub.toLocaleString()} ₸</span></div><div class="cart-summary-row"><span>${langDict[currentLang]?.service}:</span><span>${serv.toLocaleString()} ₸</span></div><div class="cart-summary-row total"><span>${langDict[currentLang]?.total}:</span><span>${tot.toLocaleString()} ₸</span></div>`;
  else if(summary)summary.innerHTML='';
  const backBtn=window.innerWidth<=480?'<button class="back-btn" onclick="toggleCart()">← Продолжить покупки</button>':'';
  document.getElementById('cart-content').innerHTML=cart.length?backBtn+cart.map(i=>`<div class="cart-item"><div><b>${i.name.ru||''}</b> ×${i.quantity}</div><div>${(i.price*i.quantity).toLocaleString()} ₸</div><div><button onclick="changeQuantity(${i.id},-1)" style="background:#e74c3c;color:white;border:none;border-radius:50%;width:24px;height:24px;">−</button> <button onclick="changeQuantity(${i.id},1)" style="background:#2ecc71;color:white;border:none;border-radius:50%;width:24px;height:24px;">+</button></div></div>`).join(''):'<p style="text-align:center;opacity:0.5">Корзина пуста</p>';
}

function toggleCart(){const sidebar=document.getElementById('cart-sidebar');sidebar.classList.toggle('open');document.body.style.overflow=sidebar.classList.contains('open')?'hidden':'';}

function openCheckout(){
  if(!cart.length)return;
  const cats=[...new Set(cart.map(i=>i.category))];
  const sched=document.getElementById('time-schedule');
  if(sched){
    sched.innerHTML=cats.map(cat=>{
      const tk=(categoryTimeMap[cat]||{timeKey:cat}).timeKey;
      let hours='';for(let h=0;h<24;h++){const hh=String(h).padStart(2,'0');hours+=`<option value="${hh}">${hh}</option>`;}
      const minutes='<option value="00">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option>';
      return `<div class="time-category-group"><label>${(categoryTimeMap[cat]||{icon:'📦'}).icon} ${langDict[currentLang]?.[cat]||cat}</label><div style="display:flex;gap:8px"><select id="time-h-${tk}" style="flex:1">${hours}</select><span style="color:rgba(255,255,255,0.5);align-self:center">:</span><select id="time-m-${tk}" style="flex:1">${minutes}</select></div></div>`;
    }).join('');
  }
  document.getElementById('order-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('checkout-modal').classList.add('open');
}
function closeCheckout(){document.getElementById('checkout-modal').classList.remove('open');}
function saveOrderLocally(order){const orders=JSON.parse(localStorage.getItem('orders')||'[]');orders.push(order);localStorage.setItem('orders',JSON.stringify(orders));}

async function submitOrder(){
  const name=document.getElementById('guest-name').value.trim(),phone=document.getElementById('guest-phone').value.trim(),date=document.getElementById('order-date').value;
  if(!name||!phone||!date){const t=document.getElementById('toast');t.textContent='❌ Заполните все поля!';t.className='toast error show';setTimeout(()=>t.classList.remove('show'),2000);return;}
  const times={};[...new Set(cart.map(i=>i.category))].forEach(c=>{const tk=(categoryTimeMap[c]||{timeKey:c}).timeKey;const h=document.getElementById('time-h-'+tk);const m=document.getElementById('time-m-'+tk);if(h&&m)times[tk]=h.value+':'+m.value;});
  const sub=cart.reduce((s,i)=>s+i.price*i.quantity,0),serv=Math.round(sub*0.15),tot=sub+serv;
  const order={id:Date.now(),restaurant:'Sandyq Алматы, Абылайхана 55',guest:{name,phone},date,items:cart.map(i=>({id:i.id,name:i.name,price:i.price,quantity:i.quantity,category:i.category})),times,special:document.getElementById('special-requests')?.value||'',subtotal:sub,service:serv,total:tot,timestamp:new Date().toISOString()};
  saveOrderLocally(order);
  const sent=await sendOrderToTelegram(order);
  cart=[];updateCart();refreshView();closeCheckout();
  document.getElementById('guest-name').value='';document.getElementById('guest-phone').value='';document.getElementById('special-requests').value='';
  document.querySelectorAll('#time-schedule select').forEach(el=>el.value='');
  const t=document.getElementById('toast');t.textContent=sent?'✅ Заказ отправлен!':'✅ Заказ сохранён';t.className='toast success show';setTimeout(()=>t.classList.remove('show'),2000);
}

document.addEventListener('DOMContentLoaded',()=>{buildNav();renderCategoryPage('salads');updateCart();moveDrop('salads');window.addEventListener('resize',()=>moveDrop(currentCategory));});
</script>
</body>
</html>
