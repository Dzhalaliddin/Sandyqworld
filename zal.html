<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Бронирование столов — Сандык</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .theme-btn-zal {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      color: #f7971e;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .theme-btn-zal:hover {
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 20px rgba(247,151,30,0.3);
    }
    body.light-theme .theme-btn-zal {
      color: #c49a2a;
      border-color: rgba(0,0,0,0.2);
    }
    body.light-theme .theme-btn-zal:hover {
      background: rgba(0,0,0,0.08);
    }
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .top-nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .time-restriction {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
    }
    body.light-theme .time-restriction {
      color: rgba(0,0,0,0.4);
    }
    
    /* ===== SVG ЦВЕТА ===== */
    .floor-plan-svg {
      display: block;
      width: 100%;
      height: auto;
      max-height: 65vh;
      cursor: grab;
    }
    .floor-plan-svg:active { cursor: grabbing; }
    
    .floor-plan-svg .table-text {
      font-size: 18px !important;
      font-weight: 700;
      fill: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      pointer-events: none;
      user-select: none;
      text-anchor: middle;
    }
    .floor-plan-svg .room-label {
      font-size: 13px !important;
      fill: #f7971e;
      text-anchor: start;
    }
    
    .floor-plan-svg .bg-main { fill: #141827; }
    .floor-plan-svg .bg-secondary { fill: #2a2d3e; }
    .floor-plan-svg .bg-accent { fill: #3a3d4e; }
    .floor-plan-svg .bg-dark { fill: #1a1d2e; }
    .floor-plan-svg .bg-gray { fill: #565656; }
    .floor-plan-svg .bg-light-gray { fill: #cfcfcf; }
    .floor-plan-svg .bg-wc { fill: #3a3d4e; }
    .floor-plan-svg .text-label { fill: #999; }
    .floor-plan-svg .text-label-light { fill: #aaa; }
    .floor-plan-svg .text-room { fill: #f7971e; }
    .floor-plan-svg .text-table { fill: #fff; }
    .floor-plan-svg .stroke-light { stroke: #888; }
    .floor-plan-svg .stroke-dark { stroke: #555; }
    .floor-plan-svg .ellipse-stage { fill: #2a2d3e; stroke: #555; }
    
    body.light-theme .floor-plan-svg .bg-main { fill: #2a2d3e; }
    body.light-theme .floor-plan-svg .bg-secondary { fill: #3a3d4e; }
    body.light-theme .floor-plan-svg .bg-accent { fill: #4a4d5e; }
    body.light-theme .floor-plan-svg .bg-dark { fill: #1a1d2e; }
    body.light-theme .floor-plan-svg .bg-gray { fill: #6a6a7a; }
    body.light-theme .floor-plan-svg .bg-light-gray { fill: #d5d5d5; }
    body.light-theme .floor-plan-svg .bg-wc { fill: #4a4d5e; }
    body.light-theme .floor-plan-svg .text-label { fill: #aaa; }
    body.light-theme .floor-plan-svg .text-label-light { fill: #ccc; }
    body.light-theme .floor-plan-svg .text-room { fill: #f7971e; }
    body.light-theme .floor-plan-svg .text-table { fill: #fff; }
    body.light-theme .floor-plan-svg .stroke-light { stroke: #aaa; }
    body.light-theme .floor-plan-svg .stroke-dark { stroke: #6a6a7a; }
    body.light-theme .floor-plan-svg .ellipse-stage { fill: #3a3d4e; stroke: #6a6a7a; }
    
    .floor-plan {
      background: #141827;
      border-radius: 16px;
      border: 1px solid #2a2d3e;
      overflow: auto;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    body.light-theme .floor-plan {
      background: #1a1d2e;
      border-color: #3a3d4e;
    }
    .floor-plan::-webkit-scrollbar { width: 8px; height: 8px; }
    .floor-plan::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
    .floor-plan::-webkit-scrollbar-thumb { background: rgba(247,151,30,0.4); border-radius: 4px; }
    body.light-theme .floor-plan::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
    body.light-theme .floor-plan::-webkit-scrollbar-thumb { background: rgba(196,154,42,0.5); }

    /* ===== КОНТЕЙНЕР ===== */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 15px 30px;
      background: rgba(10,10,20,0.6);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      min-height: 100vh;
    }
    body.light-theme .container {
      background: rgba(255,248,240,0.85);
      border-color: rgba(0,0,0,0.06);
    }

    h1 {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 600;
      color: #f7971e;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 15px;
    }
    body.light-theme .subtitle {
      color: rgba(0,0,0,0.4);
    }

    /* ===== ВКЛАДКИ ЗАЛОВ ===== */
    .hall-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .hall-tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    .hall-tab:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
    }
    .hall-tab.active {
      background: linear-gradient(135deg, #f7971e, #e67e22);
      color: white;
      border-color: #f7971e;
      box-shadow: 0 4px 15px rgba(247,151,30,0.2);
    }
    body.light-theme .hall-tab {
      border-color: rgba(0,0,0,0.12);
      background: rgba(0,0,0,0.03);
      color: rgba(0,0,0,0.4);
    }
    body.light-theme .hall-tab:hover {
      background: rgba(0,0,0,0.06);
      color: #2a1508;
    }
    body.light-theme .hall-tab.active {
      background: linear-gradient(135deg, #f7971e, #e67e22);
      color: white;
      border-color: #f7971e;
    }

    /* ===== МОДАЛКА БРОНИ ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 15px;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: rgba(20,20,40,0.96);
      backdrop-filter: blur(25px);
      max-width: 420px;
      width: 100%;
      border-radius: 20px;
      padding: 25px 20px;
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      animation: fadeUp 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    body.light-theme .modal-card {
      background: rgba(255,248,240,0.98);
      border-color: rgba(0,0,0,0.06);
    }
    body.light-theme .modal-card h3 { color: #2a1508; }
    body.light-theme .modal-card .table-number { color: #f7971e; }
    body.light-theme .modal-card .table-info { color: rgba(0,0,0,0.5); }
    body.light-theme .modal-card .placeholder-text {
      color: rgba(0,0,0,0.4);
      background: rgba(0,0,0,0.04);
    }
    body.light-theme .modal-card input,
    body.light-theme .modal-card select,
    body.light-theme .modal-card textarea {
      background: rgba(255,255,255,0.8);
      border-color: rgba(0,0,0,0.1);
      color: #2a1508;
    }
    body.light-theme .modal-card input:focus,
    body.light-theme .modal-card select:focus,
    body.light-theme .modal-card textarea:focus {
      border-color: #f7971e;
    }
    body.light-theme .btn-close {
      background: rgba(0,0,0,0.06);
      color: rgba(0,0,0,0.5);
    }
    body.light-theme .btn-close:hover { background: rgba(0,0,0,0.1); }
    body.light-theme .btn-book { background: #f7971e; }
    body.light-theme .btn-book:hover { background: #e67e22; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: scale(0.95) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-card .table-number {
      color: #f7971e;
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }
    .modal-card .table-info {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .modal-card img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 10px;
    }
    .modal-card .placeholder-text {
      color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.03);
      padding: 20px;
      border-radius: 10px;
      font-size: 0.8rem;
    }
    .modal-card input,
    .modal-card select,
    .modal-card textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #fff;
      font-size: 0.85rem;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      box-sizing: border-box;
    }
    .modal-card input[type="date"] {
      width: 100%;
      box-sizing: border-box;
      color-scheme: dark;
      min-width: auto;
      max-width: 100%;
    }
    body.light-theme .modal-card input[type="date"] {
      color-scheme: light;
    }
    .modal-card input:focus,
    .modal-card select:focus,
    .modal-card textarea:focus {
      outline: none;
      border-color: #f7971e;
    }
    .modal-card .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .modal-card .btn {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    .btn-book {
      background: linear-gradient(135deg, #f7971e, #e67e22);
      color: #fff;
    }
    .btn-book:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 25px rgba(247,151,30,0.3);
    }
    .btn-close {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
    }
    .btn-close:hover {
      background: rgba(255,255,255,0.1);
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(20,20,40,0.96);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      padding: 12px 24px;
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      opacity: 0;
      transition: all 0.4s;
      z-index: 1000;
      font-size: 0.85rem;
      text-align: center;
      min-width: 200px;
      max-width: 90%;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.success { border-left: 4px solid #2ecc71; }
    .toast.error { border-left: 4px solid #e74c3c; }
    body.light-theme .toast {
      background: rgba(255,248,240,0.96);
      color: #2a1508;
      border-color: rgba(0,0,0,0.08);
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 768px) {
      body { padding: 10px; }
      .container { padding: 15px 10px; border-radius: 16px; }
      h1 { font-size: 1.4rem; }
      .subtitle { font-size: 0.75rem; }
      .floor-plan { border-radius: 12px; }
      .floor-plan-svg { max-height: 50vh; }
      .floor-plan-svg .table-text { font-size: 14px !important; }
      .floor-plan-svg .room-label { font-size: 10px !important; }
      .hall-tab { padding: 6px 14px; font-size: 0.75rem; }
      .modal-card { padding: 20px 15px; }
      .modal-card input, .modal-card select, .modal-card textarea { padding: 12px; font-size: 1rem; }
      .modal-card input[type="date"] { padding: 12px; font-size: 1rem; }
    }
    @media (max-width: 480px) {
      .container { padding: 10px 8px; }
      h1 { font-size: 1.2rem; }
      .floor-plan-svg .table-text { font-size: 11px !important; }
      .floor-plan-svg .room-label { font-size: 8px !important; }
      .hall-tab { padding: 5px 10px; font-size: 0.65rem; }
      .modal-card { padding: 15px 12px; }
      .modal-card .btn { font-size: 0.8rem; padding: 8px; }
    }

    /* ===== ПЛАВАЮЩИЕ КНОПКИ - МОБИЛЬНАЯ ВЕРСИЯ (ДОБАВЛЕНО) ===== */
    @media (max-width: 768px) {
      .cart-fixed {
        bottom: 140px;
        right: 20px;
        z-index: 80;
      }
      .cart-fixed .cart-btn {
        width: 52px;
        height: 52px;
        font-size: 1.2rem;
      }
      .chat-fixed {
        bottom: 70px;
        right: 20px;
        z-index: 79;
      }
      .chat-fixed .chat-btn {
        width: 48px;
        height: 48px;
        font-size: 1.4rem;
      }
    }
    @media (max-width: 480px) {
      .cart-fixed {
        bottom: 120px;
        right: 15px;
      }
      .cart-fixed .cart-btn {
        width: 46px;
        height: 46px;
        font-size: 1rem;
      }
      .chat-fixed {
        bottom: 60px;
        right: 15px;
      }
      .chat-fixed .chat-btn {
        width: 42px;
        height: 42px;
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<script>

function toggleThemeZal() {
  document.body.classList.toggle('light-theme');
  const icon = document.getElementById('theme-icon-zal');
  const isLight = document.body.classList.contains('light-theme');
  icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

(function() {
  if (localStorage.getItem('theme') === 'light') {

    if (icon) icon.className = 'fas fa-sun';

// ============================================================
//  ГЕНЕРАЦИЯ ВРЕМЕНИ

function generateTimeOptions() {
  let opts = '';
  for (let h = 12; h <= 22; h++) {
    for (let m = 0; m < 60; m += 15) {
      opts += `<option value="${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}</option>`;
    }
  }
  return opts;
}

// ============================================================
//  ГЕНЕРАЦИЯ СТОЛОВ
// ============================================================
function genTable(id, type, x, y, w, h, seats, color='#22c55e', room='', customText='') {
  const cx = x + w/2, cy = y + h/2;
  let shape = '';
  switch(type) {
    case 'round': shape = `<circle cx="${cx}" cy="${cy}" r="${w/2}" fill="${color}" stroke="#2a9d4e" stroke-width="2.5" opacity="0.9"/>`; break;
    case 'rect_h': shape = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${color}" stroke="#2a9d4e" stroke-width="2.5" opacity="0.9"/>`; break;
    case 'rect_v': shape = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="${color}" stroke="#2a9d4e" stroke-width="2.5" opacity="0.9"/>`; break;
    case 'oval': shape = `<ellipse cx="${cx}" cy="${cy}" rx="${w/2}" ry="${h/2}" fill="${color}" stroke="#2a9d4e" stroke-width="2.5" opacity="0.9"/>`; break;
    case 'oval_v': shape = `<ellipse cx="${cx}" cy="${cy}" rx="${w/2}" ry="${h/2}" fill="${color}" stroke="#2a9d4e" stroke-width="2.5" opacity="0.9"/>`; break;
  }
  const text = customText || id;
  const label = room ? `<text x="${x+w+8}" y="${y+14}" class="room-label text-room">${room}</text>` : '';
  return `<g class="table-shape" data-table="${id}">${shape}<text x="${cx}" y="${cy+6}" class="table-text text-table">${text}</text>${label}</g>`;
}

      <rect x="620" y="310" width="40" height="40" rx="4" class="bg-accent"/><text x="640" y="335" class="room-label text-label" text-anchor="middle">К</text>
      <rect x="430" y="510" width="40" height="40" rx="4" class="bg-accent"/><text x="450" y="535" class="room-label text-label" text-anchor="middle">К</text>
      <rect x="620" y="510" width="40" height="40" rx="4" class="bg-accent"/><text x="640" y="535" class="room-label text-label" text-anchor="middle">К</text>
      <rect x="240" y="640" width="40" height="40" rx="4" class="bg-accent"/><text x="260" y="665" class="room-label text-label" text-anchor="middle">К</text>
      <rect x="430" y="640" width="40" height="40" rx="4" class="bg-accent"/><text x="450" y="665" class="room-label text-label" text-anchor="middle">К</text>

let currentHall = 'hall1';
let selectedTable = null;

// ============================================================
//  ЗАГРУЗКА ЗАЛА
// ============================================================
function loadHall(hallId) {
  currentHall = hallId;
  document.querySelectorAll('.hall-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.hall-tab[data-hall="${hallId}"]`)?.classList.add('active');
  document.getElementById('floorPlan').innerHTML = halls[hallId].svg;
  document.querySelectorAll('.table-shape').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      selectedTable = this.dataset.table;
      openBookingModal(selectedTable);
    });
  });
}

// ============================================================
//  ОТКРЫТИЕ МОДАЛКИ БРОНИ
// ============================================================
function openBookingModal(tableId) {
  const overlay = document.getElementById('modalOverlay');
  const card = document.getElementById('modalCard');
  const timeOpts = generateTimeOptions();
  
  // Определяем город для отображения
  const cityName = localStorage.getItem('sandyq_city') === 'astana' ? 'Астана' : 'Алматы';
  const cityAddress = localStorage.getItem('sandyq_city') === 'astana' 
    ? 'Сарайшык 34/3' 
    : 'Абылайхана 55 / Алимжанова 55';
  
  card.innerHTML = `
    <h3>Стол №${tableId}</h3>
    <div class="table-number">№${tableId}</div>
    <img src="Стол №${tableId}.jpg" alt="Фото стола №${tableId}" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
    <div class="placeholder-text" style="display:none;">🖼️ Фото не найдено</div>
    <p class="table-info">🏛️ ${halls[currentHall].name} | 📍 ${cityName}, ${cityAddress}</p>
    <input type="text" id="bookSurname" placeholder="Фамилия">
    <input type="text" id="bookName" placeholder="Имя">
    <input type="tel" id="bookPhone" placeholder="Телефон">
    <input type="number" id="bookGuests" placeholder="Количество персон" min="1" max="20">
    <input type="date" id="bookDate">
    <select id="bookTime">${timeOpts}</select>
    <p class="time-restriction">🕐 Ресторан работает с 12:00 до 23:00</p>
    <textarea id="bookComment" rows="2" placeholder="Комментарий (по желанию)"></textarea>
    <div class="btn-row">
      <button class="btn btn-close" onclick="closeModal()">Закрыть</button>
      <button class="btn btn-book" onclick="submitBooking()">📅 Забронировать</button>
    </div>
  `;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
//  СОХРАНЕНИЕ БРОНИ В ОБЛАКО
// ============================================================
async function saveBookingToCloud(booking) {
  try {
    const res = await fetch(JSONBIN_URL + '/latest', { headers: { 'X-Master-Key': JSONBIN_KEY } });
    const data = await res.json();
    const bookings = data.record.bookings || [];
    bookings.push(booking);
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: { 'X-Master-Key': JSONBIN_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ bookings: bookings, orders: data.record.orders || [] })
    });
  } catch(e) { console.warn('Ошибка сохранения брони в облако:', e); }
}

// ============================================================
//  ОТПРАВКА БРОНИ
// ============================================================
async function submitBooking() {
  const surname = document.getElementById('bookSurname').value.trim();
  const name = document.getElementById('bookName').value.trim();
  const phone = document.getElementById('bookPhone').value.trim();
  const guests = document.getElementById('bookGuests').value;
  const date = document.getElementById('bookDate').value;
  const time = document.getElementById('bookTime').value;
  const comment = document.getElementById('bookComment').value.trim();
  
  if (!surname || !name || !phone || !date) {
    showToast('❌ Заполните фамилию, имя, телефон и дату!');
    return;
  }
  
  const fullName = `${surname} ${name}`;
  const hallName = halls[currentHall].name;
  const city = localStorage.getItem('sandyq_city') || 'almaty';
  const cityName = city === 'astana' ? 'Астана' : 'Алматы';
  const cityAddress = city === 'astana' ? 'Сарайшык 34/3' : 'Абылайхана 55 / Алимжанова 55';
  
  const booking = {
    id: Date.now(),
    table: selectedTable,
    hall: currentHall,
    hallName: hallName,
    name: fullName,
    phone: phone,
    guests: guests || '—',
    date: date,
    time: time || '—',
    special: comment || '',
    city: city,
    restaurant: `Sandyq ${cityName}, ${cityAddress}`,
    timestamp: new Date().toISOString()
  };
  
  const bookings = JSON.parse(localStorage.getItem('bookings')||'[]');
  bookings.push(booking);
  localStorage.setItem('bookings', JSON.stringify(bookings));
  
  await saveBookingToCloud(booking);
  
  const msg = `📅 <b>БРОНИРОВАНИЕ СТОЛА</b>\n🍽️ Sandyq ${cityName}, ${cityAddress}\n🏛️ ${hallName}\n🪑 Стол №${selectedTable}\n\n👤 ${fullName}\n📞 ${phone}\n👥 ${guests||'—'} персон\n📅 ${date}\n⏰ ${time||'—'}${comment?`\n💬 ${comment}`:''}`;
  
  try {
    await fetch(`${TELEGRAM_API}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: msg,
        parse_mode: 'HTML',
        reply_markup: JSON.stringify({
          inline_keyboard: [[{ text: '🔗 Открыть админку', url: 'https://dzhalaliddin.github.io/Sandyqworld/admin.html' }]]
        })
      })
    });
  } catch(e) {}
  
  closeModal();
  showToast('✅ Бронирование отправлено!');
}

// ============================================================
//  ИНИЦИАЛИЗАЦИЯ
// ============================================================
document.querySelectorAll('.hall-tab').forEach(btn => btn.addEventListener('click', () => loadHall(btn.dataset.hall)));
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

loadHall('hall1');
</script>
