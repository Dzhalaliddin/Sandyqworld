<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование столов — Сандык Алматы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #141827;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 15px;
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: #1a1d2e;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2a2d3e;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-link {
            color: #f7971e;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 6px 14px;
            border: 1px solid #f7971e;
            border-radius: 16px;
        }
        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #f5e6c8;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 15px;
        }

        .hall-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .hall-tab {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #555;
            background: #1e2235;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .hall-tab.active {
            background: #f7971e;
            color: #fff;
            border-color: #f7971e;
        }

        .floor-plan {
            background: #141827;
            border-radius: 16px;
            padding: 15px;
            border: 1px solid #2a2d3e;
            overflow-x: auto;
        }
        .floor-plan svg {
            display: block;
            width: 100%;
            height: auto;
            min-width: 350px;
        }

        .table-shape { cursor: pointer; transition: all 0.2s; }
        .table-shape:hover { filter: brightness(1.4) drop-shadow(0 0 12px rgba(247,151,30,0.5)); }
        .table-text { font-size: 11px; font-weight: 700; fill: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.9); pointer-events: none; user-select: none; text-anchor: middle; }
        .room-label { font-size: 8px; fill: #f7971e; text-anchor: start; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 15px;
        }
        .modal-overlay.active { display: flex; }
        .modal-card {
            background: #1e2235;
            max-width: 420px;
            width: 100%;
            border-radius: 20px;
            padding: 25px 20px;
            border: 1px solid #3a3d4e;
            text-align: center;
            animation: fadeUp 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: scale(0.95) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-card h3 { color: #f5e6c8; font-size: 1.1rem; margin-bottom: 10px; }
        .modal-card .table-number { color: #f7971e; font-size: 2rem; font-weight: 700; }
        .modal-card .table-info { color: #aaa; font-size: 0.85rem; margin-bottom: 12px; }
        .modal-card img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #3a3d4e;
            margin-bottom: 10px;
        }
        .modal-card .placeholder-text {
            color: #888;
            background: #2a2d3e;
            padding: 20px;
            border-radius: 10px;
            font-size: 0.8rem;
        }
        .modal-card input, .modal-card select, .modal-card textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: #141827;
            border: 1px solid #3a3d4e;
            border-radius: 10px;
            color: #fff;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .modal-card input:focus, .modal-card select:focus, .modal-card textarea:focus { outline: none; border-color: #f7971e; }
        .modal-card .btn-row { display: flex; gap: 8px; margin-top: 12px; }
        .modal-card .btn {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-book { background: #f7971e; color: #fff; }
        .btn-book:hover { background: #e8891a; }
        .btn-close { background: #3a3d4e; color: #aaa; }
        .btn-close:hover { background: #4a4d5e; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 480px) {
            .container { padding: 10px; }
            .modal-card { padding: 15px; }
        }
    </style>
</head>

function generateTimeOptions() {
    let opts = '';
    for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 15) {
            const hh = String(h).padStart(2,'0');
            const mm = String(m).padStart(2,'0');
            opts += `<option value="${hh}:${mm}">${hh}:${mm}</option>`;
        }
    }
    return opts;
}

// ===== ГЕНЕРАТОР SVG СТОЛА =====
function genTable(id, type, x, y, w, h, seats, color='#22c55e', room='', customText='') {
    const cx = x + w/2, cy = y + h/2;
    let shape = '';
    switch(type) {
        case 'round': shape = `<circle cx="${cx}" cy="${cy}" r="${w/2}" fill="${color}" stroke="#2a9d4e" stroke-width="1.5" opacity="0.9"/>`; break;
        case 'rect_h': shape = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="${color}" stroke="#2a9d4e" stroke-width="1.5" opacity="0.9"/>`; break;
        case 'rect_v': shape = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="5" fill="${color}" stroke="#2a9d4e" stroke-width="1.5" opacity="0.9"/>`; break;
        case 'oval': shape = `<ellipse cx="${cx}" cy="${cy}" rx="${w/2}" ry="${h/2}" fill="${color}" stroke="#2a9d4e" stroke-width="1.5" opacity="0.9"/>`; break;
        case 'oval_v': shape = `<ellipse cx="${cx}" cy="${cy}" rx="${w/2}" ry="${h/2}" fill="${color}" stroke="#2a9d4e" stroke-width="1.5" opacity="0.9"/>`; break;
    }
    const text = customText || id;
    const label = room ? `<text x="${x+w+5}" y="${y+12}" class="room-label">${room}</text>` : '';
    return `<g class="table-shape" data-table="${id}">${shape}<text x="${cx}" y="${cy+4}" class="table-text">${text}</text>${label}</g>`;
}

let currentHall = 'hall1';
let selectedTable = null;

function loadHall(hallId) {
    currentHall = hallId;
    document.querySelectorAll('.hall-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.hall-tab[data-hall="${hallId}"]`)?.classList.add('active');
    document.getElementById('floorPlan').innerHTML = halls[hallId].svg;
    document.querySelectorAll('.table-shape').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            selectedTable = this.dataset.table;
            openBookingModal(selectedTable);
        });
    });
}

function openBookingModal(tableId) {
    const overlay = document.getElementById('modalOverlay');
    const card = document.getElementById('modalCard');
    const timeOpts = generateTimeOptions();
    card.innerHTML = `
        <h3>Стол №${tableId}</h3>
        <div class="table-number">№${tableId}</div>
        <img src="Стол №${tableId}.jpg" alt="Фото стола №${tableId}" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
        <div class="placeholder-text" style="display:none;">🖼️ Фото не найдено</div>
        <p class="table-info">🏛️ ${halls[currentHall].name} | 📍 Алматы, Абылайхана 55</p>
        <input type="text" id="bookSurname" placeholder="Фамилия">
        <input type="text" id="bookName" placeholder="Имя">
        <input type="tel" id="bookPhone" placeholder="Телефон">
        <input type="number" id="bookGuests" placeholder="Количество персон" min="1" max="20">
        <input type="date" id="bookDate">
        <select id="bookTime">${timeOpts}</select>
        <textarea id="bookComment" rows="2" placeholder="Комментарий (по желанию)"></textarea>
        <div class="btn-row">
            <button class="btn btn-close" onclick="closeModal()">Закрыть</button>
            <button class="btn btn-book" onclick="submitBooking()">📅 Забронировать</button>
        </div>
    `;
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
}

async function submitBooking() {
    const surname = document.getElementById('bookSurname').value.trim();
    const name = document.getElementById('bookName').value.trim();
    const phone = document.getElementById('bookPhone').value.trim();
    const guests = document.getElementById('bookGuests').value;
    const date = document.getElementById('bookDate').value;
    const time = document.getElementById('bookTime').value;
    const comment = document.getElementById('bookComment').value.trim();
    
    if (!surname || !name || !phone || !date) {
        showToast('❌ Заполните фамилию, имя, телефон и дату!');
        return;
    }
    
    const fullName = `${surname} ${name}`;
    const hallName = halls[currentHall].name;
    
    // Отправка в Telegram
    const msg = `📅 <b>БРОНИРОВАНИЕ СТОЛА</b>\n🍽️ Sandyq Алматы, Абылайхана 55\n🏛️ ${hallName}\n🪑 Стол №${selectedTable}\n\n👤 ${fullName}\n📞 ${phone}\n👥 ${guests||'—'} персон\n📅 ${date}\n⏰ ${time||'—'}${comment?`\n💬 ${comment}`:''}`;
    
    try {
        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: msg,
                parse_mode: 'HTML',
                reply_markup: JSON.stringify({
                    inline_keyboard: [[{ text: '🔗 Открыть админку', url: 'https://dzhalaliddin.github.io/Sandyqworld/admin.html' }]]
                })
            })
        });
        console.log('Бронь отправлена в Telegram');
    } catch(e) {
        console.log('Ошибка отправки брони:', e);
    }
    
    // Сохраняем локально
    const bookings = JSON.parse(localStorage.getItem('bookings')||'[]');
    bookings.push({
        table: selectedTable,
        hall: currentHall,
        hallName: hallName,
        name: fullName,
        phone: phone,
        guests: guests,
        date: date,
        time: time,
        comment: comment,
        city: 'Алматы',
        timestamp: new Date().toISOString()
    });
    localStorage.setItem('bookings', JSON.stringify(bookings));
    console.log('Бронь сохранена локально');
    
    closeModal();
    showToast('✅ Бронирование отправлено!');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

document.querySelectorAll('.hall-tab').forEach(btn => btn.addEventListener('click', () => loadHall(btn.dataset.hall)));
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

loadHall('hall1');
</script>
