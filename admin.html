<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админ-панель — Sandyq Алматы</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#0a0a0f,#1a1a2e,#16213e,#0f0f1a);
      color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    .login-box{
      background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);border-radius:20px;
      padding:40px;width:380px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5);
    }
    .login-box h1{font-size:2rem;margin-bottom:10px;color:#f7971e}
    .login-box input{
      width:100%;padding:14px;margin:10px 0;
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;color:white;font-size:1rem;outline:none;
    }
    .login-box input:focus{border-color:#f7971e}
    .login-box button{
      width:100%;padding:14px;margin-top:15px;
      background:linear-gradient(135deg,#f7971e,#e67e22);
      border:none;border-radius:12px;color:white;font-size:1.1rem;
      font-weight:700;cursor:pointer;transition:all 0.3s;
    }
    .login-box button:hover{box-shadow:0 8px 25px rgba(247,151,30,0.5)}
    .error{color:#e74c3c;margin-top:10px;display:none}
    .admin-panel{display:none;width:100%;max-width:1400px;padding:30px}
    .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:15px}
    .admin-nav{display:flex;gap:10px;flex-wrap:wrap}
    .admin-nav a,.admin-nav button{padding:10px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;color:white;text-decoration:none;cursor:pointer;font-size:0.9rem}
    .admin-nav a:hover,.admin-nav button:hover{background:rgba(255,255,255,0.1)}
    .logout-btn{background:#e74c3c!important;border:none!important}
    .total-orders{background:rgba(255,255,255,0.05);padding:12px 24px;border-radius:18px}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px;margin-bottom:30px}
    .stat-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:18px;text-align:center}
    .stat-value{font-size:2rem;font-weight:800;color:#f7971e}
    .stat-label{font-size:0.85rem;color:rgba(255,255,255,0.5)}
    .dishes-stats{background:rgba(255,255,255,0.04);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin-bottom:30px}
    .dish-stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .dish-stat-qty{font-weight:700;color:#f7971e}
    .date-filter{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
    .date-filter input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);padding:10px 16px;border-radius:12px;color:white;color-scheme:dark}
    .order-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.06);border-left:3px solid #f7971e;border-radius:16px;padding:20px;margin-bottom:16px}
    .order-total{font-size:1.2rem;font-weight:700;color:#f7971e;text-align:right;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)}
    .btn{padding:7px 14px;border:none;border-radius:12px;cursor:pointer;font-size:0.85rem;color:white}
    .btn-print{background:#9b59b6}
    .btn-delete{background:#e74c3c}
    .empty-orders{text-align:center;color:rgba(255,255,255,0.3);padding:50px}
    @media(max-width:768px){.login-box{width:90%}}
  </style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div class="login-box" id="login-screen">
  <h1>🔐 Sandyq Admin</h1>
  <p style="opacity:0.6;margin-bottom:20px">Введите пароль</p>
  <input type="password" id="password" placeholder="Пароль" onkeydown="if(event.key==='Enter')checkPassword()">
  <button onclick="checkPassword()">Войти</button>
  <p class="error" id="error">❌ Неверный пароль</p>
</div>

<!-- АДМИН-ПАНЕЛЬ -->
<div class="admin-panel" id="admin-panel">
  <div class="admin-header">
    <div><h1>📊 Sandyq Admin</h1><p style="opacity:0.6">📍 Алматы, Абылайхана 55</p></div>
    <div class="admin-nav">
      <a href="#" onclick="loadOrders();return false">📋 Заказы</a>
      <a href="#" onclick="downloadAllOrders();return false">📥 Скачать</a>
      <a href="#" onclick="clearAllOrders();return false" style="color:#e74c3c">🗑️ Очистить</a>
      <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
    </div>
    <div class="total-orders">📦 Заказов: <span id="orders-count">0</span></div>
  </div>

  <div class="date-filter">
    <label>📅 Дата:</label>
    <input type="date" id="filter-date" onchange="loadOrders(this.value)">
    <button class="btn btn-print" onclick="document.getElementById('filter-date').value='';loadOrders()">Сбросить</button>
  </div>

  <div class="stats-grid" id="stats-container"></div>
  <div class="dishes-stats" id="dishes-stats"></div>
  <div id="orders-list"></div>
</div>

<script>
// ===== ПРОВЕРКА ПАРОЛЯ =====
const ADMIN_PASSWORD = 'Sandyq2026'; // ← ПОМЕНЯЙТЕ НА СВОЙ ПАРОЛЬ!

function checkPassword(){
  const pass = document.getElementById('password').value;
  if(pass === ADMIN_PASSWORD){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    document.body.style.display = 'block';
    document.body.style.alignItems = 'flex-start';
    localStorage.setItem('admin_logged_in','true');
    loadOrders();
  } else {
    document.getElementById('error').style.display = 'block';
  }
}

function logout(){
  localStorage.removeItem('admin_logged_in');
  location.reload();
}

// При загрузке — проверить, залогинен ли
if(localStorage.getItem('admin_logged_in') === 'true'){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  document.body.style.display = 'block';
  document.body.style.alignItems = 'flex-start';
  loadOrders();
}

// ===== ФУНКЦИИ АДМИНКИ =====
function loadOrders(filterDate=''){
  const list=document.getElementById('orders-list'),count=document.getElementById('orders-count'),
        stats=document.getElementById('stats-container'),dishes=document.getElementById('dishes-stats');
  if(!list||!count)return;
  let orders=JSON.parse(localStorage.getItem('orders')||'[]');
  if(filterDate)orders=orders.filter(o=>o.date===filterDate);
  count.textContent=orders.length;

  if(stats&&dishes){
    const rev=orders.reduce((s,o)=>s+(o.total||0),0);
    const items=orders.reduce((s,o)=>s+(o.items||[]).reduce((ss,i)=>ss+(i.quantity||1),0),0);
    stats.innerHTML=`<div class="stat-card"><div class="stat-value">${orders.length}</div><div class="stat-label">Заказов</div></div><div class="stat-card"><div class="stat-value">${rev.toLocaleString()}₸</div><div class="stat-label">Выручка</div></div><div class="stat-card"><div class="stat-value">${items}</div><div class="stat-label">Позиций</div></div>`;
    const map={};
    orders.forEach(o=>(o.items||[]).forEach(i=>{const k=i.name?.ru||i.name||'Блюдо';if(!map[k])map[k]={name:k,qty:0};map[k].qty+=(i.quantity||1);}));
    dishes.innerHTML='<h4 style="margin-bottom:15px">📊 Популярность блюд</h4>'+Object.values(map).sort((a,b)=>b.qty-a.qty).map(d=>`<div class="dish-stat-row"><span>${d.name}</span><span class="dish-stat-qty">×${d.qty}</span></div>`).join('');
  }

  list.innerHTML=orders.length?[...orders].reverse().map((o,idx)=>{const ri=orders.length-1-idx;return `<div class="order-card"><div><b>#${o.id}</b> 👤 ${o.guest?.name||'—'} 📞 ${o.guest?.phone||'—'}</div><div>📅 ${o.date||'—'}</div>${(o.items||[]).map(i=>`<div style="display:flex;justify-content:space-between;padding:3px 0"><span>${i.name?.ru||i.name||'Блюдо'} ×${i.quantity||1}</span><span>${((i.price||0)*(i.quantity||1)).toLocaleString()}₸</span></div>`).join('')}${o.times&&Object.keys(o.times).length?`<div style="margin-top:8px;font-size:0.85rem;opacity:0.7">⏰ ${Object.entries(o.times).map(([k,v])=>`${k}:${v||'—'}`).join(' | ')}</div>`:''}${o.special?`<p style="font-size:0.85rem;opacity:0.7">💬 ${o.special}</p>`:''}<div class="order-total">💰 ${(o.total||0).toLocaleString()}₸</div><div class="order-actions"><button class="btn btn-print" onclick="printOrder(${ri})">🖨️</button><button class="btn btn-delete" onclick="deleteOrder(${ri})">🗑️</button></div></div>`}).join(''):'<div class="empty-orders"><p>Нет заказов</p></div>';
}

function printOrder(idx){
  const o=JSON.parse(localStorage.getItem('orders')||'[]')[idx];if(!o)return;
  const w=window.open('','','width=800,height=600');
  w.document.write(`<html><body style="font-family:Arial;padding:40px"><h1>Sandyq Алматы</h1><p>#${o.id} | 📅 ${o.date}</p><p>👤 ${o.guest?.name} | 📞 ${o.guest?.phone}</p><table style="width:100%;border-collapse:collapse">${(o.items||[]).map(i=>`<tr><td>${i.name?.ru||''}</td><td>×${i.quantity}</td><td>${((i.price||0)*(i.quantity||1)).toLocaleString()}₸</td></tr>`).join('')}</table><p style="font-size:1.2rem;font-weight:700;color:#f7971e;text-align:right">💰 ${(o.total||0).toLocaleString()}₸</p></body></html>`);
  w.document.close();w.print();
}

function deleteOrder(idx){if(!confirm('Удалить заказ?'))return;const o=JSON.parse(localStorage.getItem('orders')||'[]');o.splice(idx,1);localStorage.setItem('orders',JSON.stringify(o));loadOrders(document.getElementById('filter-date')?.value||'');}
function downloadAllOrders(){const o=JSON.parse(localStorage.getItem('orders')||'[]');if(!o.length)return alert('Нет заказов');const b=new Blob([JSON.stringify(o,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='orders.json';a.click();}
function clearAllOrders(){if(!confirm('Удалить ВСЕ заказы?'))return;localStorage.setItem('orders','[]');loadOrders();}
</script>
</body>
</html>
